<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Central de Estudos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .card-body { padding: 2.5rem; }
    .logo-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, #4361ee, #7209b7);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .form-control {
      border-radius: 12px; padding: 0.75rem 1rem;
      border: 2px solid #e9ecef; transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: #4361ee;
      box-shadow: 0 0 0 0.2rem rgba(67,97,238,0.15);
    }
    .btn-login {
      background: linear-gradient(135deg, #4361ee, #7209b7);
      border: none; border-radius: 12px; padding: 0.75rem;
      font-weight: 600; letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .input-group-text {
      border-radius: 12px 0 0 12px;
      border: 2px solid #e9ecef; border-right: none;
      background: #f8f9fa;
    }
    .input-group .form-control { border-radius: 0 12px 12px 0; }
    .errorlist { list-style: none; padding: 0; }
    .errorlist li {
      background: #fff3cd; border-left: 4px solid #ffc107;
      padding: 0.5rem 0.75rem; border-radius: 8px;
      color: #856404; font-size: 0.875rem;
    }
    .divider { border-top: 1px solid #e9ecef; margin: 1.5rem 0; }
    .btn-signup-outline {
      border: 2px solid #4361ee; border-radius: 12px; padding: 0.7rem;
      font-weight: 600; color: #4361ee; background: transparent;
      transition: background 0.2s, color 0.2s;
    }
    .btn-signup-outline:hover { background: #4361ee; color: #fff; }
  </style>
</head>
<body>
  <div class="container px-3" style="max-width: 420px;">
    <div class="card">
      <div class="card-body">

        <div class="text-center mb-4">
          <div class="logo-icon">
            <i class="bi bi-book-fill text-white fs-2"></i>
          </div>
          <h4 class="fw-bold mb-1">Central de Estudos</h4>
          <p class="text-muted small">Faça login para acessar seu painel</p>
        </div>

        {% if form.non_field_errors %}
          <ul class="errorlist mb-3">
            {% for error in form.non_field_errors %}
              <li><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</li>
            {% endfor %}
          </ul>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold small">Usuário</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Seu usuário" autofocus required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
            </div>
          </div>
          <button type="submit" class="btn btn-login btn-primary w-100 text-white">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
          </button>
        </form>

        <div class="divider"></div>

        <p class="text-center small text-muted mb-2">Não tem uma conta ainda?</p>
        <a href="{% url 'cadastrar' %}" class="btn btn-signup-outline w-100">
          <i class="bi bi-person-plus me-2"></i>Cadastre-se aqui — é grátis!
        </a>

      </div>
    </div>
    <p class="text-center text-white-50 small mt-3">Central de Estudos &copy; 2026</p>
  </div>
</body>
</html>
